name: Build and Release MSIX

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # required to create/delete GitHub Releases and tags
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    - name: Setup .NET
      uses: actions/setup-dotnet@v4.3.1
      with:
        dotnet-version: '9.0.x'

    - name: Create Self-Signed Certificate
      shell: pwsh
      run: |
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=WhisperGUI" -KeyUsage DigitalSignature -FriendlyName "WhisperGUI Cert" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        # Capture thumbprint — cert is already in the store, no PFX import needed
        echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

    - name: Build and Package MSIX
      shell: pwsh
      run: |
        cd WhisperGUI
        dotnet publish -c Release -f net9.0-windows10.0.19041.0 -r win-x64 /p:GenerateAppxPackageOnBuild=true /p:AppxPackageDir="../AppPackages/" /p:AppxBundle=Always /p:PackageCertificateThumbprint="${{ env.CERT_THUMBPRINT }}" /p:UapAppxPackageBuildMode=SideloadOnly /p:Platform=x64

    - name: Upload MSIX to Artifacts
      uses: actions/upload-artifact@v4.6.2
      with:
        name: WhisperGUI-MSIX
        path: AppPackages/**/*.msix*

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "build-${{ github.run_number }}"
        name: "Automated Build #${{ github.run_number }}"
        files: AppPackages/**/*.msix*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete older releases
      uses: dev-drprasad/delete-older-releases@v0.3.3
      with:
        keep_latest: 1
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
